name = "nuxt-items"
account_id = "24b45709d060d957340180e995f0d373"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]
main = "./.output/server/index.mjs"
assets = { directory = "./.output/public/", binding = "ASSETS" }

[build]
command = "npm run build"

[observability]
enabled = true
head_sampling_rate = 1

[[routes]]
pattern = "items.ippoan.org"
custom_domain = true

[vars]
NUXT_PUBLIC_AUTH_WORKER_URL = "https://alc-api.ippoan.org"
NUXT_PUBLIC_SYNC_URL = "wss://sync.mtamaramu.com"

[env.staging]
name = "nuxt-items-staging"

[[env.staging.routes]]
pattern = "items-staging.ippoan.org"
custom_domain = true

[env.staging.vars]
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth-staging.ippoan.org"
NUXT_PUBLIC_SYNC_URL = "wss://sync.mtamaramu.com"
