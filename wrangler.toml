name = "nuxt-items"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]
main = "./.output/server/index.mjs"
assets = { directory = "./.output/public/", binding = "ASSETS" }

[build]
command = "npm run build"

[observability]
enabled = true
head_sampling_rate = 1

[[routes]]
pattern = "items.mtamaramu.com"
custom_domain = true

[vars]
NUXT_PUBLIC_AUTH_WORKER_URL = "https://alc-api.ippoan.org"
NUXT_PUBLIC_SYNC_URL = "wss://sync.mtamaramu.com"

[env.staging]
name = "nuxt-items-staging"

[env.staging.vars]
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth-worker-staging.m-tama-ramu.workers.dev"
NUXT_PUBLIC_SYNC_URL = "wss://sync.mtamaramu.com"
