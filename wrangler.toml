name = "nuxt-items"
account_id = "24b45709d060d957340180e995f0d373"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]
# Nitro 出力を包む custom worker entry。/ws/items/* を ItemsSyncDO に振り分け、
# それ以外を Nitro に委譲する (worker/index.ts)。DO 本体は別 worker
# nuxt-items-sync に分離済み (この worker は migration を持たないので
# `wrangler versions upload` (no-traffic) release が CF error 10211 を踏まない)。
main = "./worker/index.ts"
assets = { directory = "./.output/public/", binding = "ASSETS" }

# items-sync (マルチデバイス同期) WebSocket relay DO への external binding。
# DO 実体 + migration は別 worker nuxt-items-sync 側で `wrangler deploy` 配備し、
# ここでは script_name 経由で stub を引くだけ (この app は migration を宣言しない)。
[[durable_objects.bindings]]
name = "ITEMS_SYNC"
class_name = "ItemsSyncDO"
script_name = "nuxt-items-sync"

# この app worker 自身は secret を一切 bind しない (INTERNAL_SHARED_SECRET の
# secrets_store binding は DO worker nuxt-items-sync に移管済み)。
# secrets.required は CI secret-verify の監査対象であると同時に **wrangler が
# deploy 時に worker 上の secret 存在を強制**するフィールドなので、ここに
# INTERNAL_SHARED_SECRET を書くと app の versions upload / deploy が
# "required secrets have not been set" で fail する (app には bind されていない
# ため)。app は secret 不要なので必ず空にする。INTERNAL_SHARED_SECRET の存在は
# DO worker (nuxt-items-sync) 側の secrets_store binding が deploy 時に解決し、
# 不在なら DO worker の deploy が loud fail する。Refs #290。
[secrets]
required = []

# 一時的な transition migration (Refs #290)。app worker が #27 で定義していた
# ItemsSyncDO class の登録が CF 上に残っており、external binding (script_name) へ
# 切替えた新版を deploy すると CF error 10064 ("existing Durable Objects depend on
# class ItemsSyncDO") で弾かれる。deleted_classes でその旧 class 登録を掃除する。
# 旧 namespace の DO データは削除されるが、別 worker への切替で元々 fresh namespace に
# なるため実質的なデータ損失は split に内在 (client は backend から再 sync)。
# **適用後は別 PR でこの block を削除し、release を no-traffic versions upload に戻す**
# (migration を含む version は versions upload 不可 = 10211 のため)。
[[migrations]]
tag = "v2"
deleted_classes = ["ItemsSyncDO"]

[build]
command = "npm run build"

[observability]
enabled = true
head_sampling_rate = 1

[[routes]]
pattern = "items.ippoan.org"
custom_domain = true

[vars]
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth.ippoan.org"
# 自オリジン (items.ippoan.org) の DO に WS 接続する。cf-grpc-proxy
# (sync.mtamaramu.com) 脱依存。
NUXT_PUBLIC_SYNC_URL = "wss://items.ippoan.org"
NUXT_PUBLIC_API_BASE_URL = "https://alc-api.ippoan.org"

[env.staging]
name = "nuxt-items-staging"

# named env は top-level binding を継承しないので external DO binding を再宣言。
# DO 実体 + migration は別 worker nuxt-items-sync-staging 側が持つ。
[[env.staging.durable_objects.bindings]]
name = "ITEMS_SYNC"
class_name = "ItemsSyncDO"
script_name = "nuxt-items-sync-staging"

# 一時的な transition migration (top-level と同じ、Refs #290)。staging deploy は
# CI が `wrangler deploy --env staging` で行う (versions upload ではない) ため、
# この deleted_classes は merge 時の staging deploy で自動適用される。適用後は
# 別 PR で削除する。
[[env.staging.migrations]]
tag = "v2"
deleted_classes = ["ItemsSyncDO"]

[[env.staging.routes]]
pattern = "items-staging.ippoan.org"
custom_domain = true

[env.staging.vars]
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth-staging.ippoan.org"
NUXT_PUBLIC_SYNC_URL = "wss://items-staging.ippoan.org"
NUXT_PUBLIC_API_BASE_URL = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
