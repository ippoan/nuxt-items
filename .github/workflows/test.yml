name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      has_tests: true
      test_command: 'npx vitest run --coverage'
      install_command: 'npm install'
      use_auth_client_dev: true
      npm_scope: '@ippoan'
      post_install_script: 'npx nuxt prepare'
      pre_install_script: |
        mkdir -p rust-logi_ref/packages/logi-proto/dist
        echo '{"name":"@yhonda-ohishi-pub-dev/logi-proto","version":"0.0.0","type":"module","main":"./dist/index.js","types":"./dist/index.d.ts","exports":{".":{"import":"./dist/index.js","types":"./dist/index.d.ts"}}}' > rust-logi_ref/packages/logi-proto/package.json
        echo 'export const ItemsService = {}; export const FilesService = {};' > rust-logi_ref/packages/logi-proto/dist/index.js
        echo 'export interface Item { [key: string]: any }; export const ItemsService: any; export const FilesService: any;' > rust-logi_ref/packages/logi-proto/dist/index.d.ts
    secrets: inherit
