name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      has_tests: true
      test_command: 'npx vitest run --coverage'
      install_command: 'npm install'
      use_auth_client_dev: true
      npm_scope: '@ippoan'
      post_install_script: 'npx nuxt prepare'
    secrets: inherit

  dev-proxy:
    uses: ippoan/ci-workflows/.github/workflows/dev-proxy-validate.yml@main
